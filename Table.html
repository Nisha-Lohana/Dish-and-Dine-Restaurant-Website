<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container my-5">
        <h2 class="text-center mb-4">Book a Table</h2>
        <form action="thanku.html" method="get" class="p-4 shadow-lg rounded">
            <div class="form-row">
                <div class="form-group col-md-4">
                    <img src="reservation.jpg" class="img-fluid" alt="">
                </div>
                <div class="col-md-8 mt-5">
                    <br>
                    <div class="form-row">
                        <div class="form-group col-md-4">
                            <input type="text" class="form-control" name="name" placeholder="Your Name" required>
                        </div>
                        <div class="form-group col-md-4">
                            <input type="email" class="form-control" name="email" placeholder="Your Email" required>
                        </div>
                        <div class="form-group col-md-4">
                            <input type="tel" class="form-control" name="phone" placeholder="Your Phone"required >
                        </div>
                    </div>
            <div class="form-row mt-4">
                <div class="form-group col-md-4">
                    <input type="date" class="form-control" name="date" required>
                </div>
                <div class="form-group col-md-4">
                    <input type="time" class="form-control" name="time" required>
                </div>
                <div class="form-group col-md-4">
                    <input type="number" class="form-control" name="people" placeholder="# of People" min="1" required>
                </div>
            </div>
            <div class="form-group mt-3 ">
                <textarea class="form-control" name="message" rows="3" placeholder="Message"></textarea>
            </div>
            <button type="submit" class="btn btn-danger btn-block mt-3 w-25 offset-4">Book a Table</button>
        </form>
    </div>

    


</body>
</html>
